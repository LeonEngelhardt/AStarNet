# config/inductive/wn18rr_astarnet_visualize.yaml

output_dir: ~/experiments/astarnet_wn18rr_visualize/

dataset:
  class: WN18RRInductive
  path: /home/ma/ma_ma/ma_leonenge/datasets/knowledge_graphs

task:
  class: InductiveKnowledgeGraphCompletion
  model:
    class: AStarNet
    base_layer:
      class: NBFNetConv
      input_dim: 32
      output_dim: 32
      query_input_dim: 32
      message_func: distmult
      aggregate_func: pna
      layer_norm: yes
      dependent: yes
    num_layer: 6
    short_cut: yes
    remove_one_hop: yes
  criterion: bce
  num_negative: 32
  strict_negative: yes
  adversarial_temperature: 0.5
  sample_weight: no
  full_batch_eval: yes

optimizer:
  class: Adam
  lr: 5.0e-3

engine:
  gpus: {{ gpus }}
  batch_size: 64

checkpoint: {{ checkpoint }}
metric: mrr
